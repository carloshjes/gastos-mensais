<svg xmlns="http://www.w3.org/2000/svg" width="160" height="96" viewBox="0 0 160 96" role="img" aria-label="Gráfico de barras animado">
  <defs>
    <linearGradient id="g" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <g fill="url(#g)">
    <rect x="12" y="66" width="20" height="22" rx="3">
      <animate attributeName="height" values="22;48;30;22" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="66;40;58;66" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="44" y="50" width="20" height="38" rx="3">
      <animate attributeName="height" values="38;62;26;38" dur="2.6s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="y"      values="50;26;62;50" dur="2.6s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="76" y="32" width="20" height="56" rx="3">
      <animate attributeName="height" values="56;74;40;56" dur="2.6s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="y"      values="32;14;48;32" dur="2.6s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <rect x="108" y="20" width="20" height="68" rx="3">
      <animate attributeName="height" values="68;80;58;68" dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="y"      values="20;8;30;20"  dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
  </g>

  <line x1="8" y1="90" x2="152" y2="90" stroke="#2a2a40" stroke-width="1.5" stroke-linecap="round"/>
</svg>
