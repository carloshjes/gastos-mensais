<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="Gastos Mensais">
  <defs>
    <radialGradient id="bgr" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo circular -->
  <circle cx="90" cy="90" r="86" fill="url(#bgr)"/>
  <circle cx="90" cy="90" r="86" fill="none" stroke="#3b1d72" stroke-width="1.5"/>

  <!-- Linha de tendência pontilhada -->
  <polyline points="38,102 64,85 90,65 116,78 142,58"
    fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Barras com glow -->
  <g filter="url(#glow)">
    <rect x="29" y="102" width="18" height="38" rx="4" fill="url(#bar)">
      <animate attributeName="height" values="38;55;30;38" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="y"      values="102;85;110;102" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <rect x="55" y="85" width="18" height="55" rx="4" fill="url(#bar)">
      <animate attributeName="height" values="55;68;44;55" dur="3.2s" repeatCount="indefinite" begin="0.3s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="y"      values="85;72;96;85"  dur="3.2s" repeatCount="indefinite" begin="0.3s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <rect x="81" y="65" width="18" height="75" rx="4" fill="url(#bar)">
      <animate attributeName="height" values="75;85;62;75" dur="3.2s" repeatCount="indefinite" begin="0.6s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="y"      values="65;55;78;65" dur="3.2s" repeatCount="indefinite" begin="0.6s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <rect x="107" y="78" width="18" height="62" rx="4" fill="url(#bar)">
      <animate attributeName="height" values="62;72;50;62" dur="3.2s" repeatCount="indefinite" begin="0.9s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="y"      values="78;68;90;78" dur="3.2s" repeatCount="indefinite" begin="0.9s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <rect x="133" y="58" width="18" height="82" rx="4" fill="url(#bar)">
      <animate attributeName="height" values="82;90;68;82" dur="3.2s" repeatCount="indefinite" begin="1.2s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="y"      values="58;50;72;58" dur="3.2s" repeatCount="indefinite" begin="1.2s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
  </g>

  <!-- Linha de base -->
  <line x1="22" y1="140" x2="158" y2="140" stroke="#3b1d72" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Sparkle grande (canto superior direito) -->
  <g stroke="#c4b5fd" stroke-linecap="round" opacity="0.85">
    <line x1="152" y1="20" x2="152" y2="30" stroke-width="1.8"/>
    <line x1="147" y1="25" x2="157" y2="25" stroke-width="1.8"/>
    <line x1="149.5" y1="22.5" x2="154.5" y2="27.5" stroke-width="1.2"/>
    <line x1="154.5" y1="22.5" x2="149.5" y2="27.5" stroke-width="1.2"/>
  </g>
  <!-- Sparkle pequeno (lateral esquerda) -->
  <g stroke="#7c3aed" stroke-linecap="round" opacity="0.65">
    <line x1="22" y1="45" x2="22" y2="51" stroke-width="1.5"/>
    <line x1="19" y1="48" x2="25" y2="48" stroke-width="1.5"/>
  </g>
  <!-- Sparkle mínimo (canto inferior direito) -->
  <g stroke="#a78bfa" stroke-linecap="round" opacity="0.5">
    <line x1="158" y1="110" x2="158" y2="114" stroke-width="1.2"/>
    <line x1="156" y1="112" x2="160" y2="112" stroke-width="1.2"/>
  </g>
</svg>
