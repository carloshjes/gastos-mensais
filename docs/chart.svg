<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 110" width="160" height="110" role="img" aria-label="Gráfico de barras animado">
  <defs>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
  </defs>

  <!-- 5 barras animadas — fundo transparente -->
  <rect x="8"   y="72" width="20" height="30" rx="4" fill="url(#bar)">
    <animate attributeName="height" values="30;50;22;30" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="y"      values="72;52;80;72" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>
  <rect x="36"  y="55" width="20" height="47" rx="4" fill="url(#bar)">
    <animate attributeName="height" values="47;62;36;47" dur="3s" repeatCount="indefinite" begin="0.25s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="y"      values="55;40;66;55" dur="3s" repeatCount="indefinite" begin="0.25s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>
  <rect x="64"  y="35" width="20" height="67" rx="4" fill="url(#bar)">
    <animate attributeName="height" values="67;80;52;67" dur="3s" repeatCount="indefinite" begin="0.5s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="y"      values="35;22;50;35" dur="3s" repeatCount="indefinite" begin="0.5s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>
  <rect x="92"  y="45" width="20" height="57" rx="4" fill="url(#bar)">
    <animate attributeName="height" values="57;70;44;57" dur="3s" repeatCount="indefinite" begin="0.75s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="y"      values="45;32;58;45" dur="3s" repeatCount="indefinite" begin="0.75s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>
  <rect x="120" y="22" width="20" height="80" rx="4" fill="url(#bar)">
    <animate attributeName="height" values="80;90;65;80" dur="3s" repeatCount="indefinite" begin="1s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="y"      values="22;12;37;22" dur="3s" repeatCount="indefinite" begin="1s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>

  <!-- Linha de base -->
  <line x1="4" y1="104" x2="156" y2="104" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Sparkle principal (canto superior direito) -->
  <g stroke="#c4b5fd" stroke-linecap="round" opacity="0.9">
    <line x1="148" y1="8"  x2="148" y2="16" stroke-width="1.8"/>
    <line x1="144" y1="12" x2="152" y2="12" stroke-width="1.8"/>
    <line x1="145.5" y1="9.5"  x2="150.5" y2="14.5" stroke-width="1.2"/>
    <line x1="150.5" y1="9.5"  x2="145.5" y2="14.5" stroke-width="1.2"/>
  </g>
  <!-- Sparkle pequeno (canto superior esquerdo) -->
  <g stroke="#a78bfa" stroke-linecap="round" opacity="0.6">
    <line x1="10" y1="20" x2="10" y2="26" stroke-width="1.4"/>
    <line x1="7"  y1="23" x2="13" y2="23" stroke-width="1.4"/>
  </g>
</svg>
